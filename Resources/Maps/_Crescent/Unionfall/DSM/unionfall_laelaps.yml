- proto: Paper
  entities:
  - uid: 663
    components:
    - type: Transform
      pos: 1.227263,14.248247
      parent: 1
    - type: Paper
      content: >-
        From: Regiment Battalion Engineering Corps


        Sir,


        The new Laelaps plans are in regrettably poor condition. Production has been curtailed, and material usage strictly limited. As the engineer assigned to this battalion, I shall offer no excuses.


        I have implemented several modifications based upon the original Laelaps drafts. I am fully aware that the engine placements are far from ideal; however, given the circumstances, no better options were available. Supplies have been exceedingly scarce for an extended period, and the same engine oil has been reused countless times — the vessel is, quite literally, barely holding together.


        I wish you every success, and trust that the ship endures until we reach our objective.


        For the Kaiser.


        — Regiment Battalion Engineering Corps
