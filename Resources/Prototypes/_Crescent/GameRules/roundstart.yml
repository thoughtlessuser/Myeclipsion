- type: entity
  id: HullrotEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: HullrotEventsTable
    minimumTimeUntilFirstEvent: 900  # 15 minutes (ECLIPSION CHANGES)
    minMaxEventTiming:
      min: 1500 # min 25 minutes between events (ECLIPSION CHANGES)
      max: 2400 # max 40 minutes between events (ECLIPSION CHANGES)

- type: entityTable
  id: HullrotEventsTable
  table: !type:AllSelector
    children:
    - id: NanoTrasenProbe
    - id: InfestedStation

    # Rat-start
    - id: RatAnomalyStationEvent
    - id: RatEmpZoneEvent
    # Rat-stop