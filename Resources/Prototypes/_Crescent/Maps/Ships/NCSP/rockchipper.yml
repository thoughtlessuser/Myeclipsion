  mapName: 'ПК Рокчиппер'
  mapPath: /Maps/_Crescent/Shuttles/NCSP/rockchipper.yml
  minPlayers: 0
  stations:
    Rockchipper:
      stationProto: StandardCrescentCivilianVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: miner
        - type: StationNameSetup
          mapNameTemplate: 'ПК Рокчиппер {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: "Retrofitted mining vessel"
