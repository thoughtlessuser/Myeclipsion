- type: vessel
  id: Rockchipper
  name: ПК Рокчиппер
  description: |
    Шаттл собранный из разрушенных "Термитов". Создана для интенсивных горных работ.
    LOADOUT: 2x 250c Exhumer mining guns
    MINIMUM CREW: 1x Pilot
  price: 25000
  category: Small
  group: None
  path: /Maps/_Crescent/Shuttles/NCSP/rockchipper.yml

- type: gameMap
