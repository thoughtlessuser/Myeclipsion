- type: vessel
  id: Spriggan
  name: ТК Сприган
  description: |
    Результат экспериментов инженера ПК с тюнингом, "Сприган" — это мобильный контрабандистско-спасательный корабль, дешевый и легко модифицируемый во что угодно.
    LOADOUT: 2x Exhumer mining guns
    MINIMUM CREW: 1x Pilot
  price: 28000
  category: Small
  group: None
  path: /Maps/_Crescent/Shuttles/NCSP/spriggan.yml

- type: gameMap
  id: Spriggan
  mapName: 'ТК Сприган'
  mapPath: /Maps/_Crescent/Shuttles/NCSP/spriggan.yml
  minPlayers: 0
  stations:
    Spriggan:
      stationProto: StandardCrescentExpeditionVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: corvette
        - type: StationNameSetup
          mapNameTemplate: 'ТК Сприган {1}'
          nameGenerator:
           !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-smuggling
        - type: VesselDescription
          description: Результат действия килограмма неизвестных наркотиков, итог похмелья инженера ПК.
