- type: vessel
  id: Lungspot
  name: ТК Легято
  description: |
    Результат потребности "Кибердав" в универсальном и эффективном корабле сопровождения класса фрегат. "Легятно" стабильно выполняет свою работу, что делает его основой операций "Кибердав".
    LOADOUT: 2x 43mm Slugthrowers
    MINIMUM CREW: 1x Pilot
  price: 27000
  category: Small
  group: None
  path: /Maps/_Crescent/Shuttles/NCSP/lungspot.yml

- type: gameMap
  id: Lungspot
  mapName: 'ТК Легято'
  mapPath: /Maps/_Crescent/Shuttles/NCSP/lungspot.yml
  minPlayers: 0
  stations:
    Lungspot:
      stationProto: StandardCrescentExpeditionVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: corvette
        - type: StationNameSetup
          mapNameTemplate: 'ТК Легято {1}'
          nameGenerator:
           !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-gunship
        - type: VesselDescription
          description: Часто встречается в ролях эскорта и боевого корабля, этот корабль вас не подведет.
