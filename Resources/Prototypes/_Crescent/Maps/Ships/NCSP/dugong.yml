- type: vessel
  id: Dugong
  name: ПК Дюгонь
  description: |
    Когда-то мирный торговый корабль, что умер на просторах Тайпана. Он был воскрешён, выполняя для ПК роль странствующего торговца их товаром.
    ВООРУЖЕНИЕ: 2x 20мм орудия.
    МИНИМАЛЬНЫЙ ЭКИПАЖ: 1 пилот  
  price: 40000
  category: Medium
  group: Civilian
  path: /Maps/_Crescent/Shuttles/NCSP/dugong.yml

- type: gameMap
  id: Dugong
  mapName: 'ПК Дюгонь'
  mapPath: /Maps/_Crescent/Shuttles/NCSP/dugong.yml
  minPlayers: 0
  stations:
    Dugong:
      stationProto: StandardCrescentCivilianVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: hauler
        - type: StationNameSetup
          mapNameTemplate: 'ПК Дюгонь {1}'
          nameGenerator:
           !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: Ламантин был безоружным кораблём... Дюгонь же способен огрызаться
