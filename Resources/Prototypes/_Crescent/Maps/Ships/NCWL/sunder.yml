- type: vessel
  id: Lister
  name: NCWL Lister
  description: A light communard assault battlecruiser.
  price: 90000
  category: Medium
  group: None
  path: /Maps/_Crescent/Shuttles/NCWL/lister.yml

- type: gameMap
  id: Lister
  mapName: 'NCWL Lister'
  mapPath: /Maps/_Crescent/Shuttles/NCWL/lister.yml
  minPlayers: 0
  stations:
    Lister:
      stationProto: StandardCrescentVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: battlecruiser
        - type: StationNameSetup
          mapNameTemplate: 'NCWL Lister {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-cruiser
