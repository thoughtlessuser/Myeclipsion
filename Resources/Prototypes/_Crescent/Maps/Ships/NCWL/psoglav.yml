- type: vessel
  id: Psoglav
  name: ЛРНП Псоглав
  description: Коммунарский тяжёлый добытчик. Помимо тяжёлой пушки 88мм, семи скорострельных 20мм, буров и магнита, этот корабль был оснащён минимум для изучений артефактов и аномалий на своём борту. В силу недостатка пространства, его исследовательские способности крайне снижены по сравнению с аналогами у других фракций в Тайпане.
  price: 90000
  category: Large
  group: None
  path: /Maps/_Crescent/Shuttles/NCWL/psoglav.yml

- type: gameMap
  id: Psoglav
  mapName: 'ЛРНП Псоглав'
  mapPath: /Maps/_Crescent/Shuttles/NCWL/psoglav.yml
  minPlayers: 0
  stations:
    Psoglav:
      stationProto: StandardCrescentStation
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: large_industrial
        - type: StationNameSetup
          mapNameTemplate: 'ЛРНП Псоглав {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-mining
        - type: VesselDescription
          description: Rickety, rusty, and borderline derelict. It'll last a few more trips.
        - type: StationJobs
          overflowJobs: []
          availableJobs:
            WorkerNCWL: [ 3, 3 ]

