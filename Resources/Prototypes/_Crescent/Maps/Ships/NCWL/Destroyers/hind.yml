- type: vessel
  id: Hind
  name: NCWL Hind
  description: |
    A light ore freighter converted into a missile destroyer.
    LOADOUT: 4x 240mm 'Gargoyle' Torpedo Launchers, 2x 20mm 'Warthog' autocannons, 1x 120mm 'Anvil' Cannon
    MINIMUM CREW: 1x Pilot, 1x Gunner/Loader
  price: 60000
  category: Medium
  group: None
  path: /Maps/_Crescent/Shuttles/NCWL/Destroyers/hind.yml

- type: gameMap
  id: Hind
  mapName: 'NCWL Hind'
  mapPath: /Maps/_Crescent/Shuttles/NCWL/Destroyers/hind.yml
  minPlayers: 0
  stations:
    Hind:
      stationProto: StandardCrescentVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: destroyer
        - type: StationNameSetup
          mapNameTemplate: 'NCWL Hind {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-missile
