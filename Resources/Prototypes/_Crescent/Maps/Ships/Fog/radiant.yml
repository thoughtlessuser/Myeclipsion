- type: vessel
  id: Radiant
  name: NT Radiant
  description: The largest autonomous hull ever fielded by NanoTrasen, built to hold the line against whatever comes out of the Fog. It's yours now, if you can afford it.
  price: 1000000 
  category: Large
  group: None
  path: /Maps/_Crescent/Shuttles/Fog/radiant.yml

- type: gameMap
  id: Radiant
  mapName: 'NT Radiant'
  mapPath: /Maps/_Crescent/Shuttles/Fog/radiant.yml
  minPlayers: 0
  stations:
     Radiant:
      stationProto: StandardCrescentVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: capital
        - type: StationNameSetup
          mapNameTemplate: 'NT Radiant {1}'
          nameGenerator:
           !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-flagship
        - type: VesselDescription
          description: A shambling behemoth, created out of necessity to combat the spread of abyssal phenomena.