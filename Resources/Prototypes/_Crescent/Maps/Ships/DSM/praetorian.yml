- type: gameMap
  id: Praetorian
  mapName: 'DSM Praetorian'
  mapPath: /Maps/_Crescent/Shuttles/DSM/Frigates/praetorian.yml
  minPlayers: 0
  stations:
    Praetorian:
      stationProto: StandardCrescentVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: corvette
        - type: StationNameSetup
          mapNameTemplate: 'DSM Praetorian {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: corvette
        - type: VesselDescription
          description: Fielded by imperials to establish dominance in the battlefield.
