- type: vessel
  id: Khan
  name: DSM Khan
  description: |
    An imperial ultralight fighter armed with two plasma gattlings.
    LOADOUT: 2x 150cc Plasma Gattlings
    MINIMUM CREW: 1x Pilot
  price: 10000
  category: Small
  group: None
  path: /Maps/_Crescent/Shuttles/DSM/khan.yml

- type: gameMap
  id: Khan
  mapName: 'DSM Khan'
  mapPath: /Maps/_Crescent/Shuttles/DSM/khan.yml
  minPlayers: 0
  stations:
    Khan:
      stationProto: StandardCrescentVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: ultralight
        - type: StationNameSetup
          mapNameTemplate: 'DSM Khan {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-fighter
