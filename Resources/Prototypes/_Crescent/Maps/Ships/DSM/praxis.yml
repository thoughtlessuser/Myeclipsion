- type: vessel
  id: Praxis
  name: БМС Праксис
  description: |
   Многофункциональное капитальное судно, предназначенное для горнодобывающих операций и длительных экспедиций. Оснащено миниатюрным крылом Медицина/Наука, микропечью, исследовательским сервером и станцией, а также полноценной установкой для добычи ресурсов.

   Корабль способен как самостоятельно вести добычу с помощью встроенного вооружения типа Exhumer, так и поддерживать высадку экипажа для ручной разработки месторождений. Часто используется как мобильная база для независимых Писцов, позволяя жить и работать прямо на борту.

   Имеет тяжёлую броню и щит 1-го уровня, выполняя роль капитального корабля в горнодобывающих операциях.

   ВООРУЖЕНИЕ: 6x 200cc «Retribution» малые лазерные гатлинги
   МИНИМАЛЬНЫЙ ЭКИПАЖ: 1x Капитан, 1x Стрелок, 1x Писец-исследователь, 4x Шахтёр (опционально)
  price: 125000
  category: Medium
  group: None
  path: /Maps/_Crescent/Shuttles/DSM/praxis.yml

- type: gameMap
  id: Praxis
  mapName: 'БМС Праксис'
  mapPath: /Maps/_Crescent/Shuttles/DSM/praxis.yml
  minPlayers: 0
  stations:
    Praxis:
      stationProto: StandardCrescentVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: large_industrial
        - type: StationNameSetup
          mapNameTemplate: 'БМС Праксис {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-salvage
