- type: vessel
  id: Shark
  name: SHI Shark
  description: A heavy corporate security destroyer, providing fire superiority.
  price: 90000
  category: Medium
  group: None
  path: /Maps/_Crescent/Shuttles/SHI/shark.yml

- type: gameMap
  id: Shark
  mapName: 'SHI Shark'
  mapPath: /Maps/_Crescent/Shuttles/SHI/shark.yml
  minPlayers: 0
  stations:
    Shark:
      stationProto: StandardCrescentVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: cruiser
        - type: StationNameSetup
          mapNameTemplate: 'SHI Shark {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-patrol
