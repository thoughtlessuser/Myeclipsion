- type: vessel
  id: Exhumer
  name: ICM Exhumer
  description: |
    An ancient and widely used design, the ICM Exhumer is an entry-level mining corvette, equipped with mining plusers; this ship is the backbone of taypan's mining industry.
    LOADOUT: 2x SHI 250c "Exhumer" kinetic Pulser
    MINIMUM CREW: 1x Pilot
  price: 26000
  category: Small
  group: Civilian
  path: /Maps/_Crescent/Shuttles/Civilian/exhumer.yml

- type: gameMap
  id: Exhumer
  mapName: 'ICM Exhumer'
  mapPath: /Maps/_Crescent/Shuttles/Civilian/exhumer.yml
  minPlayers: 0
  stations:
    Exhumer:
      stationProto: StandardCrescentCivilianVessel
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: miner
        - type: StationNameSetup
          mapNameTemplate: 'ICM Exhumer {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-mining
