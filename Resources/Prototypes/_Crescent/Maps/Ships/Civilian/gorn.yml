- type: vessel
  id: Gorn
  name: ICM Gorn
  description: |
   A small industrial vessel. The “Gorn” differs from standard mining shuttles with its powerful drilling system, onboard ore processing system, and increased maneuverability.
   EQUIPMENT: 2x Exhumer
   MINIMUM CREW: 1 pilot
  price: 31000
  category: Small
  group: Civilian
  path: /Maps/_Crescent/Shuttles/Civilian/gorn.yml

- type: gameMap
  id: Gorn
  mapName: 'ICM Gorn'
  mapPath: /Maps/_Crescent/Shuttles/Civilian/gorn.yml
  minPlayers: 0
  stations:
    Gorn:
      stationProto: StandardCrescentExpeditionVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: civilian
        - type: StationNameSetup
          mapNameTemplate: 'ICM Gorn {1}'
          nameGenerator:
           !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-mining
        - type: VesselDescription
          description: Welcome to your personal mining paradise.
