- type: gameMap
  id: Refuge
  mapName: 'The Refuge'
  mapPath: /Maps/_Crescent/Stations/refuge.yml
  minPlayers: 0
  stations:
    Refuge:
      stationProto: StandardCrescentStation
      gridComponents:
        - type: BlockShipWeaponProjectileGrid
        - type: PreventPilot
        - type: MapIcon
          iconType: Station
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: outpost
        - type: StationNameSetup
          mapNameTemplate: 'ОСР Убежище'
        - type: VesselDesignation
          designation: vessel-designation-headquarters
        - type: Grammar
          attributes:
            proper: true
        - type: StationJobs
          overflowJobs: []
          availableJobs:
            OverseerSRM: [ 1, 1 ]
            MontagneSRM: [ 1, 1 ]
            HunterSRM: [ 4, 4 ]
            TenderSRM: [ 1, 1 ]
            AcolyteSRM: [ 5, 5 ]

- type: gameMap
