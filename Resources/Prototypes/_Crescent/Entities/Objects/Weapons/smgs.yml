#NCWL
- type: entity
  name: NCWL DS3 Militant 9x39mm
  parent: [BaseWeaponRifle, StreeCredRedeemable]
  id: WeaponSubMachineGunMilitant
  description: A 9x39 submachinegun designed for the NCWL internal police, comes with a huge supressor that makes it a pain in the ass to holster.
  components:
  - type: Item
    shape:
    - 0,0,5,1
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Guns/militant.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Crescent/Objects/Weapons/Guns/militant.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineCaselessRifle
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineCaselessRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeCaselessRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeCaselessRifle
  - type: Gun
    availableModes:
    - SemiAuto
    - FullAuto
    fireRate: 12
    soundGunshot:
      path: /Audio/_Crescent/Weapons/Guns/supressed_2/supressed_gunshot_2.ogg
      params:
        volume: -10
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ReverseEngineering
    difficulty: 2
    recipes:
      - WeaponSubMachineGunMilitant
      - WeaponSubMachineGunBloodhound
      - WeaponSubMachineGunNCWLWatchdog

