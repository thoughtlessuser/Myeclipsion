  id: UnionfallDSMShipCaptainNote
  name: доклад инженерного корпуса
  components:
  - type: Paper
    content: |
      REGIMENT BATTALION
      ENGINEERING CORPS REPORT

      Sir,

      I do not wish to speak poorly,
      but given our trust I must be honest.

      Keeping this rusted wreck running
      is a miracle. The ship is literally
      falling apart.

      Supplies have been scarce, the same
      engine oil has circulated far too long,
      and much of the vessel has rusted and
      become filthy.

      Some of the weapons were also corroded.
      We emptied them to remove the rust.

      Be sure to reload them before battle.

      ------------------------------------------------

      SHIP STATUS

      To improve your survival chances in the
      upcoming engagements we relocated the
      bridge to a more secure position.

      The move was rushed however, and some
      prisoners have already turned the old
      bridge into a makeshift bar.

      Please excuse the ship's shortcomings.

      The prisoners we carry must either reach
      redemption soon, or we must reach our
      destination before they worsen the
      situation further.

      For the Kaiser!

      ------------------------------------------------

      NOTE

      Your belongings have been moved to the
      new bridge.

      We are aware that some items are missing.
      During the relocation several prisoners
      managed to loot part of your property.

      We recovered most of it, however we
      suspect that your special gun may
      currently be somewhere in the
      dormitories.