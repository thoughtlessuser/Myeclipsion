- type: entity
  parent: Paper
  id: UnionfallDSMShipCaptainNote
  name: доклад инженерного корпуса
  components:
  - type: Paper
    content: |
      ПОЛКОВОЙ БАТАЛЬОН
      ДОКЛАД ИНЖЕНЕРНОГО КОРПУСА

      Сэр,

      Я не хочу говорить плохо,
      но, доверившись нам, вы должны знать правду.

      Поддерживать эту ржавую развалину на плаву —
      настоящее чудо. Корабль буквально
      разваливается на части.

      Припасов мало, одно и то же моторное масло
      циркулирует слишком долго, и большая часть
      судна проржавела и покрылась грязью.

      Некоторые образцы вооружения также подверглись коррозии.
      Мы опорожнили их, чтобы удалить ржавчину.

      Обязательно перезарядите их перед битвой.

      ------------------------------------------------

      СТАТУС КОРАБЛЯ

      Чтобы повысить ваши шансы на выживание в
      предстоящих сражениях, мы переместили
      мостик на более защищённую позицию.

      Перемещение было поспешным, и некоторые
      заключённые уже превратили старый
      мостик в импровизированный бар.

      Прошу простить корабль за его недостатки.

      Заключённые, которых мы перевозим, должны либо
      скоро обрести искупление, либо мы должны достичь
      пункта назначения, прежде чем они усугубят
      ситуацию ещё больше.

      За Кайзера!

      ------------------------------------------------

      ПРИМЕЧАНИЕ

      Ваши вещи были перенесены на
      новый мостик.

      Мы знаем, что некоторых предметов не хватает.
      Во время перемещения нескольким заключённым
      удалось разграбить часть вашего имущества.

      Большую часть мы вернули, однако мы
      подозреваем, что ваше особенное оружие
      сейчас может находиться где-то в
      жилых отсеках.