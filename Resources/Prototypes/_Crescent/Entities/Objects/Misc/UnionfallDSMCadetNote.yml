- type: entity
  parent: Paper
  id: UnionfallDSMCadetNote
  name: брифинг дисциплинарного полка Мандата
  components:
  - type: Paper
    content: |
      БОЖЕСТВЕННЫЙ МАНДАТ СОЛНЦА
      БРИФИНГ ДИСЦИПЛИНАРНОГО ПОЛКА

      Солдаты Полка,

      Вы служите в дисциплинарном полку Мандата —
      формировании, состоящем из опозоренных солдат,
      преступников и осуждённых ветеранов.

      Мандат не тратит впустую ни одного полезного слугу.

      В секторе Тайпан наш патрульный флот обнаружил
      остатки повстанческого флота, принадлежащего
      Лиге Рабочих Нового Полумесяца.

      Отказ связи не позволяет запросить подкрепление.
      Поэтому эта битва ложится только на нас.

      Считайте это своим шансом на искупление.

      ------------------------------------------------

      ЗАДАЧА

      Уничтожьте базы данных клонирования противника,
      расположенные на их военных кораблях.

      Эти устройства позволяют силам повстанцев снова и снова
      возвращаться на поле боя.

      Уничтожьте их — и восстание умрёт здесь.

      Методы:

      • Уничтожьте их, используя корабельное вооружение
      • Проникните на вражеские суда и совершите диверсию

      Порядок диверсии:
      - Время взаимодействия: 10 секунд
      - Таймер детонации: 60 секунд

      Вражеские техники могут обезвредить устройство. Защищайте его до последнего вздоха.

      ------------------------------------------------

      БЕЗДНА ГРЯДЁТ

      В начале операции оба флота находятся
      внутри защитных барьеров.

      Длительность: 20 минут.

      Используйте это время, чтобы:

      • Организовать корабельные команды
      • Развернуть истребители
      • Сформировать абордажные партии

      Как только барьер падёт,
      начнётся сражение флотов.

      ------------------------------------------------

      ПРИКАЗЫ

      1. Доложите Рыцарю-Знаменосцу
         или Верховному Стюарду.

      2. Присоединитесь к команде действующего корабля
         или получите талон на истребитель.

      3. Совершите вылет через консоль верфи.

      4. Следуйте приказам командования флота Мандата.

      Искупление достигается через послушание.

      ЗА КАЙЗЕРА!

      СЛАВА МАНДАТУ!