- type: entity
  parent: Paper
  id: UnionfallDSMCadetNote
  name: брифинг дисциплинарного полка Мандата
  components:
  - type: Paper
    content: |
      DIVINE SOL MANDATE
      DISCIPLINARY REGIMENT BRIEFING

      Soldiers of the Regiment,

      You serve in a Mandate disciplinary regiment —
      a formation composed of disgraced soldiers,
      criminals and condemned veterans.

      Mandate wastes no useful servant.

      In the Taypan sector our patrol fleet has detected
      the remnants of a rebel warfleet belonging to the
      New Crescent Workers League.

      Communications failure prevents reinforcement.
      Therefore this battle falls to us alone.

      Consider this your opportunity for redemption.

      ------------------------------------------------

      OBJECTIVE

      Destroy the enemy Cloner Databases located aboard
      their warships.

      These devices allow rebel forces to continuously
      return to the battlefield.

      Eliminate them and the rebellion dies here.

      Methods:

      • Destroy them using ship weaponry
      • Board enemy vessels and sabotage them

      Sabotage procedure:
      - Interaction time: 10 seconds
      - Detonation timer: 60 seconds

      Enemy technicians may disarm the device. So defend it till your last breath.

      ------------------------------------------------

      HADAL TIDE

      At the beginning of the operation both fleets are
      contained within protective barriers.

      Duration: 20 minutes.

      Use this time to:

      • Organize ship crews
      • Deploy fighters
      • Form boarding parties

      Once the barrier collapses,
      the fleet engagement will begin.

      ------------------------------------------------

      ORDERS

      1. Report to the Knight Banneret
         or the Grand Steward.

      2. Join an operational ship crew
         or acquire a fighter voucher.

      3. Deploy through the shipyard console.

      4. Follow Mandate fleet command.

      Redemption is earned through obedience.

      FOR THE KAISER!

      GLORY TO MANDATE!