    content: |
      NEW CRESCENT WORKERS LEAGUE
      REVOLUTIONARY SOLDIER BRIEFING

      Comrade,

      After the fall of Nova Belraska,
      the revolutionary forces of the
      New Crescent Workers League have
      withdrawn to the Taypan sector.

      Our fleet now operates from the
      converted freighter "Dear Clementine".

      The Divine Sol Mandate has detected
      our presence and is moving to crush
      what they believe to be the final
      remnants of the revolution.

      They are mistaken.

      ------------------------------------------------

      OBJECTIVE

      Destroy the Mandate Cloner Databases
      located aboard their warships.

      These systems allow imperial soldiers
      to endlessly return to battle.

      Destroy them and the Mandate fleet
      will collapse.

      Methods:

      • Destroy them using ship weapons
      • Board enemy vessels and sabotage them

      Sabotage procedure:
      - Interaction time: 10 seconds
      - Detonation timer: 60 seconds

      Enemy engineers may disarm the device.

      ------------------------------------------------

      HADAL TIDE

      At the start of the operation both
      fleets are confined within a defensive
      barrier.

      Duration: 20 minutes.

      Use this time to:

      • Organize crews
      • Prepare fighters
      • Coordinate with command

      When the barrier falls,
      the battle begins.

      ------------------------------------------------

      ORDERS TO ALL SOLDIERS

      1. Report to the Kommissar or Admiral.
      2. Join an active ship crew or obtain
         a fighter voucher.
      3. Deploy via the shipyard console.
      4. Maintain formation and follow orders.

      The revolution survives only if we fight.

      Stand firm, comrade.

      Long live the Workers.
      Long live the Revolution.
