- type: entity
  parent: Paper
  id: UnionfallNCWLCadetNote
  name: брифинг революционного бойца ЛРНП
  components:
  - type: Paper
    content: |
      ЛИГА РАБОЧИХ НОВОГО ПОЛУМЕСЯЦА
      БРИФИНГ РЕВОЛЮЦИОННОГО БОЙЦА

      Товарищ,

      После падения Новы Белраски
      революционные силы
      Лиги Рабочих Нового Полумесяца
      отступили в сектор Тайпан.

      Наш флот сейчас действует с
      переоборудованного грузового судна «Дорогая Клементина».

      Божественный Мандат Солнца обнаружил
      наше присутствие и движется, чтобы раздавить
      то, что они считают последними
      остатками революции.

      Они ошибаются.

      ------------------------------------------------

      ЗАДАЧА

      Уничтожьте базы данных клонирования Мандата,
      расположенные на их военных кораблях.

      Эти системы позволяют имперским солдатам
      бесконечно возвращаться в бой.

      Уничтожьте их, и флот Мандата
      рухнет.

      Методы:

      • Уничтожьте их, используя корабельное вооружение
      • Проникните на вражеские суда и совершите диверсию

      Порядок диверсии:
      - Время взаимодействия: 10 секунд
      - Таймер детонации: 60 секунд

      Вражеские инженеры могут обезвредить устройство.

      ------------------------------------------------

      БЕЗДНА ГРЯДЁТ

      В начале операции оба
      флота изолированы внутри защитного
      барьера.

      Длительность: 20 минут.

      Используйте это время, чтобы:

      • Организовать команды
      • Подготовить истребители
      • Скоординировать действия с командованием

      Когда барьер падёт,
      начнётся битва.

      ------------------------------------------------

      ПРИКАЗЫ ВСЕМ БОЙЦАМ

      1. Доложите Комиссару или Адмиралу.
      2. Присоединитесь к команде действующего корабля или получите
         талон на истребитель.
      3. Совершите вылет через консоль верфи.
      4. Держите строй и следуйте приказам.

      Революция выживет, только если мы будем сражаться.

      Держись, товарищ.

      Да здравствуют Рабочие.
      Да здравствует Революция.