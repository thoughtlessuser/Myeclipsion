#starburst

- type: entity
  parent: BaseTurretShipgun
  id: WeaponTurretStarburst
  suffix: Small Hybrid
  name: 150cc 'Starburst' Plasma Gatling
  description: A light hybrid weapons platform that superheats unstable units of plasma and flings them at high speeds at targets. The plasma projectiles are inaccurate, but pack a punch.
  components:
    - type: Sprite
      sprite: _Crescent/Objects/Turrets/Hybrid/starburst.rsi
      drawdepth: Mobs
      layers:
        - state: starburst
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 1500
          # TODO: Construction graph
          behaviors:
            - !type:ChangeConstructionNodeBehavior
              node: machineFrame
            - !type:PlaySoundBehavior
              sound:
                collection: MetalGlassBreak
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
          ents: []
    - type: Gun
      fireOnDropChance: 0
      projectileSpeed: 60
      fireRate: 8
      selectedMode: FullAuto
      availableModes:
        - FullAuto
      angleDecay: 20
      minAngle: 3.5
      maxAngle: 35
      angleIncrease: 2.75
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/laserturret.ogg
        params:
          variation: 0.12
    - type: RechargeBasicEntityAmmo
      rechargeCooldown: .5
      rechargeSound:
        path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
        params:
          pitch: 1.2
          variation: 0.08
    - type: BasicEntityAmmoProvider
      proto: BulletPlasmaGatling
      capacity: 120
      count: 120
    - type: ApcPowerReceiver
      powerLoad: 2500
    - type: HardpointAnchorableOnly
      class: Energy
      size: Small

