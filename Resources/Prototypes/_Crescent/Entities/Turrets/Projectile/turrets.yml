#20mm screamer

- type: entity
  parent: BaseTurretShipgun
  id: WeaponTurretSmallMachinegun
  suffix: Machinegun, Small Ballistics
  name: 20mm 'Screamer' Rotary Cannon
  description: A light and reliable gatling system for both point defense and offensive purposes. It's relatively low fire rate negates overheating. It's large magazine doesnt require frequent loading.
  components:
    - type: Sprite
      sprite: _Crescent/Objects/Turrets/Projectile/minigun.rsi
      drawdepth: Mobs
      layers:
        - state: minigun
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 1200
          # TODO: Construction graph
          behaviors:
            - !type:ChangeConstructionNodeBehavior
              node: machineFrame
            - !type:PlaySoundBehavior
              sound:
                collection: MetalGlassBreak
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
          ents: []
    - type: Gun
      fireOnDropChance: 0
      fireRate: 6
      projectileSpeed: 80
      selectedMode: FullAuto
      availableModes:
        - FullAuto
      angleDecay: 1
      minAngle: 2
      maxAngle: 4.5
      angleIncrease: 0.25
      soundGunshot: /Audio/Weapons/Guns/Gunshots/vulcan.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine20mm
          insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          priority: 2
          whitelist:
            tags:
              - Magazine20mm
        gun_chamber:
          name: Chamber
          startingItem: Cartridge20mm
          priority: 1
          whitelist:
            tags:
              - Cartridge20mm
    - type: ApcPowerReceiver
      powerLoad: 2000
    - type: HardpointAnchorableOnly
      class: Ballistic
      size: Small
    - type: MagazineAmmoProvider

