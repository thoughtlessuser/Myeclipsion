#shortbow

- type: entity
  parent: BaseTurretShipgun
  id: BaseWeaponTurretShortbow
  suffix: ShipGun
  name: 48mm 'Shortbow' SRM
  description: A burst fire dedicated anti-fighter missile system. Has quite limited range.
  components:
    - type: Sprite
      sprite: _Crescent/Objects/Turrets/Missile/shortbow.rsi
      drawdepth: Mobs
      layers:
        - state: shortbow
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 1000
          # TODO: Construction graph
          behaviors:
            - !type:ChangeConstructionNodeBehavior
              node: machineFrame
            - !type:PlaySoundBehavior
              sound:
                collection: MetalGlassBreak
    - type: ProjectileIFF
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
          ents: []
    - type: Gun
      fireOnDropChance: 0
      projectileSpeed: 40
      burstCooldown: 2.5
      shotsPerBurst: 2
      burstFireRate: 8
      selectedMode: Burst
      availableModes:
        - Burst
      soundGunshot: /Audio/Weapons/Guns/Gunshots/rpgfire.ogg
    - type: BallisticAmmoProvider
      cycleable: false
      capacity: 12
      fillWithDoAfter: false
      proto: Cartridge48mmRocket
      whitelist:
        tags:
        - CartridgeShortbow
    - type: ApcPowerReceiver
      powerLoad: 2000
    - type: HardpointAnchorableOnly
      class: Missile
      size: Small

- type: entity
  parent: BaseWeaponTurretShortbow
  id: BaseWeaponTurretShortbowGorlex
  suffix: ShipGun
  name: Gorlex 48mm 'Buzzsaw' SRM
  description: A vicious short range swarm missile system. Fires faster and generally comes with higher yield missiles.
  components:
