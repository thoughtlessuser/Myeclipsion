                collection: MetalGlassBreak
    - type: Gun
      fireOnDropChance: 0
      projectileSpeed: 40
      burstCooldown: 2.5
      shotsPerBurst: 3
      burstFireRate: 8
      selectedMode: Burst
      availableModes:
        - Burst
    - type: BallisticAmmoProvider
      cycleable: false
