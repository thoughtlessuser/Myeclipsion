    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 2000
          # TODO: Construction graph
          behaviors:
            - !type:ChangeConstructionNodeBehavior
              node: machineFrame
            - !type:PlaySoundBehavior
              sound:
                collection: MetalGlassBreak
    - type: ContainerContainer
