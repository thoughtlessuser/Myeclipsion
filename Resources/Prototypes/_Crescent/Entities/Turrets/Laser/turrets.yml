#exhumer
- type: entity
  parent: BaseFixedShipgun
  id: ShuttleGunExhumer
  name: SHI 250c "Exhumer" kinetic pulser
  suffix: ShipGun
  description: A fixedpoint mining tool that accelerates sound waves to kinetically slice through rock - mostly seen on civilian miner models.
  components:
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: StaticPrice
    price: 1500
  - type: Sprite
    sprite: _Crescent/Objects/ShuttleWeapons/mininglaser.rsi
    layers:
    - state: states
    - state: mag-7
  - type: Machine
    board: ShuttleGunExhumerCircuitboard
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Gun
    fireOnDropChance: 0
    projectileSpeed: 40
    fireRate: 4
    selectedMode: SemiAuto
    angleDecay: 45
    minAngle: 5
    maxAngle: 15
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg
      params:
        variation: 0.12
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: .25
    rechargeSound:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        pitch: 1.2
        variation: 0.08
  - type: BasicEntityAmmoProvider
    proto: BulletKineticShuttle
    capacity: 50
    count: 50
  - type: HardpointAnchorableOnly
    class: Ballistic
    size: Small
  - type: Construction
    graph: Machine
    node: machine
    containers:
    - machine_parts
    - machine_board

#curse

- type: entity
  parent: BaseTurretShipgun
  id: WeaponTurretCurse
  suffix: Medium Energy
  name: 300w 'Curse' EMP Projector
  description: A medium energy platform that shoots ionized hardlight that interferes with shuttle electronics.
  components:
    - type: Sprite
      sprite: _Crescent/Objects/Turrets/Laser/curse.rsi
      drawdepth: Mobs
