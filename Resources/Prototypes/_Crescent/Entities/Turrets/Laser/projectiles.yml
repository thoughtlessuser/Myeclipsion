- type: entity
  id: BulletKineticShuttle #Exhumer
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: chronobolt
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Blunt: 30
        Structural: 35
  - type: Ammo
    muzzleFlash: HitscanEffect
  - type: TimedDespawn
    lifetime: 1.5
  - type: PointLight
    radius: 2.5
    color: white
    energy: 0.5
  - type: GatheringProjectile
  - type: ShipWeaponProjectile
  - type: ProjectileIFF
    visualType: Circle
    color: White

- type: entity
  id: BulletCurse
  name: ion ray
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent
    mask:
    - Impassable
    - BulletImpassable
  - type: ShipWeaponProjectile
  - type: Projectile
    ignoreWeaponGrid: true
    damage:
      types:
        Heat: 75
  - type: ProjectileIFF
    visualType: Circle
    color: Blue
  - type: EmpOnTrigger
    range: 7
    energyConsumption: 3500
    disableDuration: 10
  - type: PointLight
    radius: 3.5
    color: blue
    energy: 0.5
  - type: TimedDespawn
    lifetime: 9 #1080
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: bluespace

