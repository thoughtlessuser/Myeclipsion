#DEBUG - DO NOT USE

- type: entityList
  id: excelsiorUplinkDropTable
  entities:
  - SheetPlasma1
  - SheetUranium1

- type: entity
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  id: PassiveSpawnerDebugPrototype
  name: Excelsior Material Drop-In Uplink
  suffix: DEBUG, DO NOT MAP
  description: A advanced machine used by the Excelsior revolutionary group to bring material support to violent revolutions at points of interest.
  components:
  - type: Sprite
    sprite: _Shitmed/Structures/Machines/limbgrower.rsi
    snapCardinals: true
    layers:
    - state: limbgrower_idleoff
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: PassiveSpawningMachine
    entityListProto: excelsiorUplinkDropTable
    spawnDelay: 5
    requirePower: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: machineFrame
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
          - MachineLayer
  - type: Anchorable
    flags:
    - None

