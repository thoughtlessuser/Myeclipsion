- type: gameMap
  id: IronRing
  mapName: 'NT Ragged Outpost'
  mapPath: /Maps/_Rat/Stations/ironring.yml
  minPlayers: 0
  stations:
    IronRing:
      stationProto: StandardCrescentStation
      gridComponents:
        - type: BlockShipWeaponProjectileGrid
        - type: MapIcon
          iconType: Station
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: outpost
        - type: StationNameSetup
          mapNameTemplate: 'NT Ragged Outpost'
        - type: VesselDesignation
          designation: vessel-designation-headquarters
        - type: VesselDescription
          description: Once this place was an important mining settlement of Taypan, but now it is an abandoned refuge for outcasts.
        #- type: VesselMusic
          #ambientMusicPrototype: CountsmanMusic
        - type: Grammar
          attributes:
            proper: true
        - type: StationJobs
          overflowJobs: []
          availableJobs:
            Vagrant: [ -1, -1 ]