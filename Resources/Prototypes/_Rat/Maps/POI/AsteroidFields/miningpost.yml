- type: gameMap
  id: RatFakel
  mapName: 'NT Torch'
  mapPath: /Maps/_Crescent/POI/defunctminingpost.yml
  minPlayers: 0
  stations:
    RatFakel:
      stationProto: StandardCrescentPOI
      gridComponents:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: asteroids
        - type: MapIcon
          iconType: Station
      components:
        - type: StationNameSetup
          mapNameTemplate: 'NT Torch'

