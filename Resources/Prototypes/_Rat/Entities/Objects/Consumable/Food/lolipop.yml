- type: entity
  parent: FoodBase
  id: RatLollipop
  name: lolipop
  description: A bright lollipop. Lifts your spirits and boosts your energy levels.
  components:
  - type: Food
    solution: "food"
    delay: 3.0
    transferAmount: 5
    trash:
    - RatLolipopStick
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Sugar
          Quantity: 15
  - type: Item
    size: Small
  - type: Clothing
    sprite: _Rat/Objects/Consumable/Food/lolipop.rsi
    slots: [MASK]
  - type: IngestionBlocker
  - type: Sprite
    sprite: _Rat/Objects/Consumable/Food/lolipop.rsi
    state: icon



- type: entity
  name: lolipop stick
  parent: BaseItem
  id: RatLolipopStick
  categories: [ HideSpawnMenu ]
  description: Eat it down to the stick... and keep going.
  components:
  - type: Sprite
    sprite: _Rat/Objects/Consumable/Food/lolipop.rsi
    layers:
      - state: empty
  - type: Tag
    tags:
    - Trash
  - type: SpaceGarbage