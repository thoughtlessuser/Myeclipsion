- type: entity
  id: CustomUploadBoombox
  name: Старый Бумбокс
  parent: BaseItem
  suffix: Ratgore, Mirage
  description: Бумбокс, играющий песни вашей молодости
  components:
  - type: Sprite
    sprite: _Crescent/Objects/Misc/boombox.rsi
    layers:
    - state: base
      map: ["enum.JukeboxVisualLayers.Base"]
  - type: Item
    sprite: _Crescent/Objects/Misc/boombox.rsi
    size: Large
  - type: Clothing
    sprite: _Crescent/Objects/Misc/boombox.rsi
    quickEquip: false
    slots:
    - Back
    - SuitStorage
  - type: CustomBoombox
    onState: base
    offState: base
    selectState: base
  - type: Appearance
  - type: ActivatableUI
    key: enum.CustomBoomboxUiKey.Key
  - type: UserInterface
    interfaces:
        enum.CustomBoomboxUiKey.Key:
          type: Content.Client._Rat.Audio.CustomBoombox.CustomBoomboxBoundUserInterface
  - type: StaticPrice
    price: 300
