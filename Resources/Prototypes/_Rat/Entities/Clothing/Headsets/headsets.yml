- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetNCSPCommand
  name: hired gun's headset
  description: To communicate with your brothers in arms.
  components:
    - type: ContainerFill
      containers:
        key_slots:
          - EncryptionKeyTFSCCommand
          - EncryptionKeySyndiesGorlex
          - EncryptionKeyTraffic
    - type: Sprite
      sprite: Clothing/Ears/Headsets/base_syndicate.rsi
    - type: Clothing
      sprite: Clothing/Ears/Headsets/base_syndicate.rsi

