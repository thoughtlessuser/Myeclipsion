- type: entity
  parent: BaseComputer
  id: ComputerIntredyneLifeInsurance
  name: консоль страхования Interdyne
  description: Управление страховкой жизни людей. Позволяет удаленно ускорить создание клона, обойдя ограничение на количество должностей на станции клиента.
  placement:
    mode: SnapgridCenter
  components:
  - type: Computer
    board: LifeInsuranceComputerCircuitboard
  - type: ContainerFill
    containers:
      board: [ LifeInsuranceComputerCircuitboard ]
  - type: MeleeSound
    soundGroups:
      Brute:
        collection: MetalGlassBreak
  - type: AccessReader
    access: [["SyndicateInterdyne"]]
  - type: ActivatableUIRequiresAccess
    popupMessage: life-insurance-popup-access-denied
  - type: Sprite
    netsync: false
    noRot: true
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: tcboss
    - map: ["computerLayerKeys"]
      state: tech_key
    - map: ["enum.WiresVisualLayers.MaintenancePanel"]
      state: generic_panel_open
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
        computerLayerKeys:
          True: { visible: true, shader: unshaded }
          False: { visible: true, shader: shaded }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }
  - type: ActivatableUI
    key: enum.LifeInsuranceUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LifeInsuranceUiKey.Key:
        type: Content.Client._Rat.LifeInsurance.LifeInsuranceBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: LifeInsuranceConsole
  - type: MaterialStorage
    materialWhiteList:
    - ExoticProteins
    storageLimit: 100000
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#b89f25"
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    offset: "0, 0.4"
    castShadows: false
  - type: DeviceLinkSource
    range: 200
    ports:
      - OrderSender
