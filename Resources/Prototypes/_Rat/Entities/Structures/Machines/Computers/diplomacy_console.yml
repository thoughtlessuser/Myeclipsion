- type: entity
  parent: [BaseComputerAiAccess, BaseStructureDisableToolUse, BaseStructureUnanchorable]
  id: ComputerDiplomacyConsole
  name: Дипломатическая консоль
  description: Консоль для управления отношениями между фракциями.
  components:
    - type: DiplomacyConsole
    - type: Sprite
      layers:
        - map: ["computerLayerBody"]
          state: computer
        - map: ["computerLayerKeyboard"]
          state: generic_keyboard
        - map: ["computerLayerScreen"]
          state: generic
        - map: ["computerLayerKeys"]
          state: generic_keys
        - map: ["enum.WiresVisualLayers.MaintenancePanel"]
          state: generic_panel_open
    - type: ActivatableUI
      key: enum.DiplomacyConsoleUiKey.Key
    - type: UserInterface
      interfaces:
        enum.DiplomacyConsoleUiKey.Key:
          type: DiplomacyConsoleBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface
