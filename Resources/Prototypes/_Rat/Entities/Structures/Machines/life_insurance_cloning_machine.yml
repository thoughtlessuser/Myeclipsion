- type: entity
  parent: BaseMachine
  id: LifeInsuranceCloningMachine
  name: IPM cloning safety machine
  description: Prints the client's bodies according to the policies. The device is attached to the console when taking out insurance. Cloning materials are uploaded directly to the life insurance console.
  placement:
    mode: SnapgridCenter
  components:
  - type: LifeInsuranceSpawnMachine
  - type: Sprite
    sprite: _Rat/Structures/Machines/cloning_ipm.rsi
    snapCardinals: true
    layers:
      - state: pod_0
        map: ["base"]
  - type: PointLight
    radius: 1.45
    energy: 1.4
    color: "#db5858"
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    offset: "0, 0.35"
    castShadows: false
  - type: StaticPrice
    price: 0
