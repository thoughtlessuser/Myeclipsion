- type: entity
  parent: ColMarTechBase
  id: ColMarTechEquipmentNCWL
  name: automated communard equipment rack
  description: An automated rack connected to a massive storage of standard League equipment.
  components:
  - type: AccessReader
    access:
    - [ "NCWLGeneral" ]
  - type: Sprite
    sprite: _Crescent/Structures/syndicatearmory.rsi
  - type: CMAutomatedVendor
    jobs:
    - PartisanNCWL
    sections:
    - name: Class Kit
      choices: { CMClass: 1 }
      entries:
      - id: CMVendorBundleRiflemanApparelNCWL
        name: basic NCWL kit
        recommended: true
    - name: Armor
      choices: { CMArmour: 1 }
      entries:
      - id: ClothingOuterHardsuitNCWLInfantry
        name: NCWL hardsuit
        recommended: true
      - id: ClothingOuterArmorNCWLHeavyCarapace
        name: NCWL body armor
    - name: Primary Weapon
      choices: { CMWeapon: 1 }
      entries:
      - id: WeaponRifleFAL
        name: NCWL MK-2 Falin 5.56x45mm
        recommended: true
      - id: WeaponShotgunProletar
        name: NCWL Toz-97 Proletariat 12 gauge
      - id: WeaponSubMachineGunNCWLWatchdog
        name: NCWL DS1 Watchdog 9x19mm
    - name: Utilities
      choices: { CMUtilities: 2 }
      entries:
      - id: ExGrenade
        name: fragmentation grenade
      - id: EmpGrenade
        name: EMP Grenade
      - id: BreachingCharge
        name: breaching charge
      - id: HandHeldMassScannerEE
        name: handheld mass scanner
        recommended: true
    - name: Ammunition
      choices: { CMAmmo: 2 }
      entries:
      - id: MagazinePistolSubMachineGun
        name: 35-round SMG magazine (9x19mm PSTF auto)
      - id: MagazineLightRifle
        name: 30-round magazine (5.56x45mm)
      - id: MagazineShotgun
        name: 10-round magazine (12 gauge)

