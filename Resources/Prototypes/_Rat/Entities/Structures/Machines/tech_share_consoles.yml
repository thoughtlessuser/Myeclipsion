- type: entity
  id: TechShareRequestConsole
  name: Technology Transfer Console
  description: Allows transferring technology access to other stations.
  suffix: Ratgore, TechShare
  parent: BaseComputer
  components:
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: comm_syndie
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: TechShareRequest
    consoleName: "TECH-REQ"
  - type: ResearchClient
  - type: ActivatableUI
    key: enum.Content.Shared._Rat.Research.TechShare.TechShareRequestUiKey.Key
  - type: UserInterface
    interfaces:
      enum.Content.Shared._Rat.Research.TechShare.TechShareRequestUiKey.Key:
        type: Content.Client._Rat.Research.TechShare.TechShareRequestBui

- type: entity
  id: TechShareReceiverConsole
  name: Technology Reception Console
  description: Accepts connections and grants access to another stations technologies.
  suffix: Ratgore, TechShare
  parent: BaseComputer
  components:
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: comm
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: TechShareReceiver
    consoleName: "TECH-RCV"
  - type: ResearchClient
  - type: ActivatableUI
    key: enum.Content.Shared._Rat.Research.TechShare.TechShareReceiverUiKey.Key
  - type: UserInterface
    interfaces:
      enum.Content.Shared._Rat.Research.TechShare.TechShareReceiverUiKey.Key:
        type: Content.Client._Rat.Research.TechShare.TechShareReceiverBui
