        posY: -1000
        IFFColor: IndianRed
        IFFFaction: TFSC
      Hayes:
        gameMapID: Hayes
        posX: 5000
        posY: -4000
        IFFColor: IndianRed
        IFFFaction: TFSC
      TribalHideout:
        gameMapID: TribalHideout
        posX: 2000
        posY: -7000
        IFFColor: White
        IFFFaction: TAP
        randomOffsetX: 2000
        randomOffsetY: 2000
      IronRing:
        gameMapID: IronRing
        posX: -3000
        posY: 500
      RatFakel:
        gameMapID: RatFakel
        posX: 0
        posY: 0
