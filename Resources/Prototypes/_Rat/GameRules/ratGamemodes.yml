- type: gamePreset
  id: RatAdventure
  alias:
  - adventure
  - ratadventure
  name: Свободная игра
  showInVote: true
  description: Последние дни Тайпана. Длится 2-4 часа.
  rules:
  - RatAdventure
  - HullrotEventScheduler

- type: entity
  id: RatAdventure
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: AdventureRule
    gameMapsByID:
      PortBalreska:
        gameMapID: PortBalreska
        posX: -3000
        posY: -7000
        IFFColor: Orange
        IFFFaction: NCWL
      AuroraImperialis:
        gameMapID: AuroraImperialis
        posX: 3000
        posY: 7000
        IFFColor: "#C677A5"
