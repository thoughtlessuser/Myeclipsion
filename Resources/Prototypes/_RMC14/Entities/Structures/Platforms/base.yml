- type: entity
  abstract: true
  id: CMPlatformBase
  name: platform
  description: A square metal surface resting on four legs.
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/platforms.rsi
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Platform

- type: entity
  abstract: true
  id: CMPlatformBaseBroken
  name: destroyed platform
  description: A square metal surface resting on four legs. It has been destroyed.
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/platforms.rsi
  - type: InteractionOutline
  - type: Clickable

- type: entity
  parent: CMPlatformBaseBroken
  id: CMPlatformBroken
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
    canCollide: false
  - type: Sprite
    state: platform_broken

- type: entity
  parent: CMPlatformBase
  id: CMPlatform
  name: platform
  description: A square metal surface resting on four legs.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    state: platform

- type: entity
  parent: CMPlatformBase
  id: RMCPlatformCornerSmall
  name: platform
  description: A square metal surface resting on four legs.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,0.49,-0.36,0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    state: platform_deco

- type: Tag
  id: Platform
