- type: entity
  abstract: true
  parent: CMBaseStructureCorrodible
  id: RMCBaseWindowFrame
  name: window frame
  description: A big hole in the wall that used to sport a large window. Can be vaulted through.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Walls
  - type: PlacementReplacement
    key: walls
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 1000
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - BulletImpassable
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Structure
    - WindowFrame

- type: entity
  parent: RMCBaseWindowFrame
  id: RMCWindowFrameAlmayer
  components:
