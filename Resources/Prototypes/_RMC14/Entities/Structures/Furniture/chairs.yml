# Basic chair

- type: Tag
  id: RMCSeat

- type: entity
  abstract: true
  parent: SeatBase
  id: CMSeatBase
  name: abstract chair
  suffix: RMC
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/chairs.rsi
    state: chair
  - type: Tag
    tags:
    - RMCSeat
- type: entity
  parent: [ CMSeatBase, ChairFolding ]
  id: CMChair
  name: chair
  description: A rectangular metallic frame sitting on four legs with a back panel. Designed to fit the sitting position, more or less comfortably.
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/folding_chair.rsi
    layers:
    - state: chair
      map: ["unfoldedLayer"]
    - state: chair_folded
      map: ["foldedLayer"]
      visible: false

- type: entity
  parent: CMChair
  id: CMChairFolded
  suffix: RMC|folded
- type: entity
  parent: CMSeatBase
  id: CMChairNonFold
  abstract: true
  name: chair
  description: A rectangular metallic frame sitting on four legs with a back panel. Designed to fit the sitting position, more or less comfortably.
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/chairs.rsi
    state: chair
  - type: Physics
    bodyType: Static

- type: entity
  parent: CMChairNonFold
  id: CMChairAlt
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/chairs.rsi
    state: chair_alt

- type: entity
  parent: CMChairNonFold
  id: RMCStool
  name: stool
  description: Apply butt.
  components:
  - type: Sprite
    state: stool

- type: entity
  parent: CMSeatBase
  id: CMChairComfy
  name: comfy chair
  description: A chair with leather padding and adjustable headrest. You could probably sit in one of these for ages.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: comfychair
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static

- type: entity
  parent: CMChairComfy
  id: CMChairComfyARES
  description: A functional chair designed for comfortably sitting a single person with intent to facilitate interactions with the ship AI.
  suffix: RMC|ARES
  components:
  - type: Sprite
    state: comfychair_ares

- type: entity
  parent: CMChairComfyARES
