- type: entity
  parent: BaseStructureDynamic
  id: RMCStructureLattice
  name: structural lattice
  description: Like rebar, but in space.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/structure_lattice.rsi
    state: structure_lattice_a
  - type: Icon
    sprite: _RMC14/Structures/structure_lattice.rsi
    state: structure_lattice_a
  - type: Transform
    anchored: true
    noRot: false
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - MachineMask
        layer:
        - GlassAirlockLayer
  - type: InteractionOutline
- type: entity
  parent: RMCStructureLattice
  id: RMCStructureLatticeB
  components:
  - type: Sprite
    state: structure_lattice_b
  - type: Icon
    state: structure_lattice_b

- type: entity
  parent: RMCStructureLattice
  id: RMCStructureLatticeC
  components:
  - type: Sprite
    state: structure_lattice_c
  - type: Icon
    state: structure_lattice_c

